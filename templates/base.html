<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>horneado</title>
  <meta property="og:title" content="horneado">
  <meta property="og:description" content="bake shop">
  <meta property="og:image" content="https://horneado.up.railway.app/static/8.jpg">
  <meta property="og:url" content="https://horneado.up.railway.app">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav>
    <a href="/" class="logo">horneado</a>
    <div class="hamburger" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </div>
    <div class="dropdown" id="dropdown">
      <a href="/info">Information
        <span class="menu-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </span>
      </a>
      <a href="/menu">Menu
        <span class="menu-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <ellipse cx="12" cy="20" rx="9" ry="2.5"/>
            <rect x="3" y="11" width="18" height="9" rx="1"/>
            <ellipse cx="12" cy="11" rx="9" ry="2.5"/>
            <path d="M7 11 C7 8 17 8 17 11" stroke-width="1"/>
            <line x1="12" y1="4" x2="12" y2="8"/>
            <ellipse cx="12" cy="3.5" rx="1" ry="1.5" fill="currentColor" stroke="none"/>
          </svg>
        </span>
      </a>
      <a href="/cart">Cart
        <span class="menu-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/>
          </svg>
        </span>
      </a>
      <a href="/login">Login
        <span class="menu-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
      </a>
      <a href="/location">Location
        <span class="menu-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
            <circle cx="12" cy="9" r="2.5"/>
          </svg>
        </span>
      </a>
    </div>
  </nav>
  <div class="subtitle">bake shop</div>

  {% block content %}{% endblock %}

  <script>
    function toggleMenu() {
      const dropdown = document.getElementById('dropdown');
      dropdown.classList.toggle('open');
    }
  </script>
</body>
</html>
